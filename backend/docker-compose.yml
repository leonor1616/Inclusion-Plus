version: "3.9"

services:
  db:
    image: postgres:16
    container_name: inclusion_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: inclusion_plus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: inclusion_backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/inclusion_plus
    volumes:
      - ./:/app
      - /app/node_modules

volumes:
  postgres_data: